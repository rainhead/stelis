name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # The build clock (ADR 0004) normally reads the beeatlas checkout's git
    # committer date, which CI has no checkout for. beeatlas-source-date-epoch
    # short-circuits on a numeric SOURCE_DATE_EPOCH — the documented override for
    # other hosts — so pin one and the graph never shells git.
    env:
      SOURCE_DATE_EPOCH: '1700000000'
    steps:
      - uses: actions/checkout@v4

      # The `datalog` package the planner needs ships in the full Racket
      # distribution (setup-racket's default), already installed at installation
      # scope — so we must NOT re-request it as a user package (that errors on the
      # wider-scope install). A bare full distribution is enough.
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          version: '9.2'
          variant: 'CS'
          distribution: 'full'

      # The suite is hermetic and undemanding: pure-core units over synthetic
      # graphs plus integration checks against the in-repo beeatlas graph. No
      # network and no external checkout. The DuckDB-backed tests (relation
      # digests, the fan-out manifest check) self-skip when the `duckdb` CLI or a
      # populated reference dir is absent — as it is here — so they no-op rather
      # than fail. Install the DuckDB CLI in this job if that coverage is wanted.
      - name: Run tests
        run: raco test src/*-test.rkt
